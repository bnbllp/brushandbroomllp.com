<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact Us | Brush & Broom LLP</title>
  <meta name="description" content="Get in touch with Brush & Broom LLP for expert painting, cleaning, and power washing services in Walla Walla, WA." />
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet" />
  <style>
    :root {
      --light: #f9f9f9;
      --green: #28c76f;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      color: var(--light);
      overflow-x: hidden;
      background: #0f172a;
    }
    .bg-slideshow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background-size: cover;
      background-position: center;
      animation: slideBg 24s infinite ease-in-out;
    }
    @keyframes slideBg {
      0%, 100% { background-image: url('bg1.jpg'); }
      25% { background-image: url('bg2.jpg'); }
      50% { background-image: url('bg3.jpg'); }
      75% { background-image: url('bg4.jpg'); }
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: rgba(15, 23, 42, 0.9);
      border-bottom: 4px solid var(--green);
      position: relative;
    }
    .logo-title {
      display: flex;
      align-items: center;
    }
    .logo-title img {
      height: 60px;
      margin-right: 15px;
    }
    .logo-title h1 {
      font-family: 'Permanent Marker', cursive;
      font-size: 1.9em;
      color: white;
      margin: 0;
      border-left: 4px solid var(--green);
      border-right: 4px solid var(--green);
      padding: 0 12px;
      text-shadow: 2px 2px 5px black;
    }
    .menu-btn {
      position: absolute;
      top: 100%;
      right: 20px;
      margin-top: 5px;
      font-size: 2.5em;
      background: linear-gradient(to right, #ff7a24, #28c76f, #2499ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      border: none;
      cursor: pointer;
      z-index: 1100;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
    .side-menu {
      position: fixed;
      top: 104px;
      right: -300px;
      width: 260px;
      height: calc(100% - 104px);
      background: rgba(15, 23, 42, 0.97);
      box-shadow: -3px 0 10px #000;
      transition: right 0.3s ease-in-out;
      z-index: 1050;
      padding: 30px 20px;
    }
    .side-menu.open {
      right: 0;
    }
    .side-menu h2 {
      margin-top: 0;
      color: var(--green);
    }
    .side-menu a {
      display: block;
      margin: 15px 0;
      color: white;
      font-weight: bold;
      text-decoration: none;
    }
    .side-menu a:hover {
      color: var(--green);
    }
    #menuOverlay {
      display: none;
      position: fixed;
      top: 104px;
      left: 0;
      width: 100%;
      height: calc(100% - 104px);
      background-color: rgba(0, 0, 0, 0.6);
      z-index: 1000;
    }
    main {
      max-width: 600px;
      margin: 40px auto 120px;
      background: rgba(15, 23, 42, 0.9);
      padding: 30px 25px;
      border-radius: 15px;
    }
    main h2 {
      font-size: 2.4em;
      margin-bottom: 25px;
      background: linear-gradient(to right, #ff7a24, #2499ff, var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
    }
    form label {
      display: block;
      margin: 15px 0 6px;
      font-weight: bold;
    }
    form input, form textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: none;
      font-size: 1em;
      font-family: inherit;
    }
    form textarea {
      resize: vertical;
      min-height: 100px;
    }
    form button {
      margin-top: 20px;
      background: var(--green);
      border: none;
      padding: 12px 25px;
      font-size: 1.2em;
      font-weight: bold;
      color: white;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 3px 10px #28c76f80;
      transition: background-color 0.3s ease;
    }
    form button:hover {
      background-color: #22a15f;
    }
    footer {
      text-align: center;
      background: rgba(15, 23, 42, 0.85);
      padding: 10px 5px;
      font-size: 0.9em;
      color: #ccc;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
    .footer-contact {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 30px;
      font-weight: bold;
      text-decoration: none;
      color: white;
      margin: 5px;
      background-color: var(--green);
      box-shadow: 0 3px 10px #28c76f80;
      transition: background-color 0.3s ease;
    }
    .social-icons img {
      height: 30px;
      margin: 0 10px;
      vertical-align: middle;
    }
    .social-icons a {
      display: inline-block;
    }
    @media (max-width: 600px) {
      main {
        margin: 20px 10px 120px;
        padding: 20px 15px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-slideshow"></div>

  <header>
    <div class="logo-title">
      <a href="index.html"><img src="logo.PNG" alt="Logo" style="height: 75px;" /></a>
      <h1>Brush & Broom LLP</h1>
    </div>
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
  </header>

  <div id="menuOverlay" onclick="toggleMenu()"></div>

  <nav id="sideMenu" class="side-menu" aria-label="Site menu">
    <h2>Menu</h2>
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="about.html">About Us</a>
    <a href="portfolio.html">Our Portfolio</a>
    <a href="safety.html">Safety & Preparation</a>
    <a href="contact.html">Contact Us</a>
  </nav>

  <main>
    <h2>Contact Us</h2>
    <form action="mailto:bnbllp@brushandbroomllp.com" method="post" enctype="text/plain">
      <label for="name">Name*</label>
      <input type="text" id="name" name="Name" required />
      
      <label for="email">Email*</label>
      <input type="email" id="email" name="Email" required />
      
      <label for="phone">Phone</label>
      <input type="tel" id="phone" name="Phone" />
      
      <label for="message">Message*</label>
      <textarea id="message" name="Message" required></textarea>
      
      <button type="submit">Send Message</button>
    </form>
  </main>

<footer>
  <div style="margin-bottom: 15px;">
    <a href="tel:5092004873" class="footer-contact">📞 Call Us</a>
    <a href="sms:5092004873" class="footer-contact">💬 Text Us</a>
    <a href="mailto:bnbllp@brushandbroomllp.com" class="footer-contact">📧 Email Us</a>
    <a href="/contact.html" class="footer-contact small-btn">📝 Get a Quote</a>
  </div>
  <p>&copy; 2025 Brush & Broom LLP</p>
</footer>

  <script>
    function toggleMenu() {
      const menu = document.getElementById("sideMenu");
      const overlay = document.getElementById("menuOverlay");
      menu.classList.toggle("open");
      overlay.style.display = menu.classList.contains("open") ? "block" : "none";
    }
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('#sideMenu a').forEach(link => {
        link.addEventListener('click', toggleMenu);
      });
    });
  </script>
</body>
</html>
