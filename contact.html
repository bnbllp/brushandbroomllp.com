<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Request a Free Cleaning Quote | Brush & Broom LLP</title>
  <meta name="description" content="Get a free, no-pressure cleaning quote from Brush & Broom LLP. Family-owned house cleaning, deep cleaning, and move-out cleaning in Bellevue, Kirkland, Redmond & Eastside King County." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy: #002244;
      --green: #69be28;
      --green-dark: #5aa81f;
      --gray: #a5acaf;
      --white: #ffffff;
      --light-bg: #f9f9f9;
      --shadow: 0 6px 14px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin:0; padding:0; }
    body { font-family:'Roboto', sans-serif; background-color:var(--light-bg); color:var(--navy); line-height:1.65; }

    header.quote-hero {
      background: linear-gradient(to bottom, rgba(0,34,68,0.9), rgba(0,34,68,0.75));
      color: var(--white);
      padding: 60px 20px;
      text-align: center;
    }

    .quote-hero h1 { font-family: 'Playfair Display', serif; font-size:2.5rem; margin-bottom:15px; }
    .quote-hero p { font-size:1.2rem; margin-bottom:25px; }
    .trust-line { margin-top: 10px; font-size: 0.95rem; color: var(--gray); }

    main {
      max-width: 800px;
      margin: -40px auto 50px auto;
      background-color: var(--white);
      padding: 40px 30px;
      border-radius: 10px;
      box-shadow: var(--shadow);
    }

    form { display:flex; flex-direction:column; gap:20px; }
    input, textarea, select { padding:12px 15px; border-radius:6px; border:1px solid #ccc; font-size:1rem; width:100%; }
    textarea { resize: vertical; }
    button {
      padding:14px 20px; border-radius:6px; border:none; background-color:var(--green); color:var(--white);
      font-weight:700; font-size:1rem; cursor:pointer; transition: all 0.25s ease;
    }
    button:hover { background-color: var(--green-dark); transform:translateY(-2px); }

    footer { background-color: var(--navy); color: var(--gray); text-align: center; padding: 20px; font-size: 0.85rem; }

    @media(max-width:768px){
      .quote-hero h1 { font-size: 2rem; }
      main { margin: -30px 15px 40px 15px; padding: 30px 20px; }
    }
  </style>
</head>

<body>

<header class="quote-hero">
  <h1>Get Your Free Cleaning Quote</h1>
  <p>Fast, no-pressure estimates for house cleaning, deep cleans, and move-outs in Bellevue, Kirkland, Redmond & Eastside King County.</p>
  <p class="trust-line">Licensed • Insured • Family-Owned • Eco-Friendly Options</p>
</header>

<main>
  <!-- FORMSPREE FORM -->
  <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
    <!-- Redirect to thank-you page -->
    <input type="hidden" name="_next" value="https://www.brushandbroomllp.com/thank-you">
    <!-- Email the submissions -->
    <input type="hidden" name="_to" value="seabnbllp@icloud.com">
    <!-- Set custom subject line -->
    <input type="hidden" name="_subject" value="New Quote Request – Brush & Broom LLP">
    <!-- Optional: disable captcha -->
    <input type="hidden" name="_captcha" value="false">

    <label for="name">Full Name *</label>
    <input type="text" id="name" name="name" required>

    <label for="email">Email *</label>
    <input type="email" id="email" name="email" required>

    <label for="phone">Phone Number *</label>
    <input type="tel" id="phone" name="phone" required>

    <label for="service">Type of Service *</label>
    <select id="service" name="service" required>
      <option value="" disabled selected>Select a service</option>
      <option value="House Cleaning">House Cleaning</option>
      <option value="Deep Cleaning">Deep Cleaning</option>
      <option value="Move-In / Move-Out">Move-In / Move-Out</option>
      <option value="Painting Inquiry">Painting Inquiry</option>
      <option value="Other">Other</option>
    </select>

    <label for="address">Address</label>
    <input type="text" id="address" name="address">

    <label for="details">Details / Special Requests</label>
    <textarea id="details" name="details" rows="5"></textarea>

    <button type="submit">Request Your Free Quote</button>
  </form>
</main>

<footer>
  <p>© Brush & Broom LLP — Serving Bellevue, Kirkland, Redmond & Eastside King County</p>
</footer>

</body>
</html>
