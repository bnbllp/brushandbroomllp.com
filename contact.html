<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us | Brush & Broom LLP – Walla Walla Painting, Cleaning & Power Washing</title>
  <meta name="description" content="Contact Brush & Broom LLP for painting, cleaning, or power washing in Walla Walla, WA. Call, text, email, or send us a message through the form." />
  <meta property="og:title" content="Contact Brush & Broom LLP" />
  <meta property="og:description" content="Reach out for expert painting, cleaning & pressure washing in Walla Walla." />
  <meta property="og:image" content="https://www.brushandbroomllp.com/logo.PNG" />
  <meta property="og:url" content="https://www.brushandbroomllp.com/contact.html" />
  <meta name="twitter:card" content="summary_large_image" />
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <style>
    :root {
      --green: #28c76f;
      --light: #f9f9f9;
      --dark: #0f172a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      color: var(--light);
      background: var(--dark);
      overflow-x: hidden;
    }

    .bg-slideshow {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-size: cover;
      background-position: center;
      animation: slideBg 24s infinite ease-in-out;
      z-index: -1;
    }

    @keyframes slideBg {
      0%, 100% { background-image: url('bg1.jpg'); }
      25% { background-image: url('bg2.jpg'); }
      50% { background-image: url('bg3.jpg'); }
      75% { background-image: url('bg4.jpg'); }
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.5rem;
      background: rgba(15, 23, 42, 0.9);
      border-bottom: 4px solid var(--green);
    }

    .logo-title {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo-title img {
      height: 60px;
    }

    .logo-title h1 {
      font-family: 'Permanent Marker', cursive;
      font-size: 1.8em;
      padding: 0 0.5rem;
      border-left: 4px solid var(--green);
      border-right: 4px solid var(--green);
      color: white;
    }

    .logo-title a {
      text-decoration: none;
      display: flex;
      align-items: center;
    }

    .menu-btn {
      font-size: 2.2em;
      background: linear-gradient(to right, #ff7a24, #28c76f, #2499ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      border: none;
      cursor: pointer;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
    }

    #sideMenu {
      position: fixed;
      top: 104px;
      right: -280px;
      width: 250px;
      height: calc(100% - 104px);
      background: rgba(15, 23, 42, 0.97);
      padding: 2rem 1.25rem;
      box-shadow: -4px 0 12px #000;
      transition: right 0.3s ease;
      z-index: 1050;
    }

    #sideMenu.open { right: 0; }

    #sideMenu h2 {
      color: var(--green);
      margin-bottom: 1rem;
    }

    #sideMenu a {
      display: block;
      margin: 0.75rem 0;
      color: white;
      font-weight: bold;
      text-decoration: none;
    }

    #sideMenu a:hover { color: var(--green); }

    #menuOverlay {
      display: none;
      position: fixed;
      top: 104px;
      left: 0;
      width: 100%;
      height: calc(100% - 104px);
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
    }

    main {
      max-width: 960px;
      margin: 3rem auto;
      padding: 2rem;
      background: rgba(15, 23, 42, 0.9);
      border-radius: 15px;
      text-align: center;
    }

    main h2 {
      font-size: 2.2em;
      margin-bottom: 1rem;
      background: linear-gradient(to right, #ff7a24, #2499ff, var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    form {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    input, textarea {
      padding: 0.75rem;
      border-radius: 8px;
      border: none;
      font-size: 1em;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button[type="submit"] {
      background: var(--green);
      color: white;
      font-weight: bold;
      border: none;
      padding: 1rem;
      border-radius: 8px;
      cursor: pointer;
    }

    .contact-options {
      margin-top: 3rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .contact-options a {
      display: inline-block;
      background: var(--green);
      color: white;
      font-weight: bold;
      text-decoration: none;
      padding: 0.75rem 1.25rem;
      border-radius: 30px;
      transition: background 0.3s ease;
    }

    .contact-options a:hover {
      background: #20b362;
    }

    footer {
      text-align: center;
      background: rgba(15, 23, 42, 0.85);
      padding: 1.2rem;
      font-size: 0.9em;
      color: #ccc;
    }

    .footer-contact {
      display: inline-block;
      margin: 0.25rem;
      padding: 0.5rem 1rem;
      border-radius: 30px;
      background: var(--green);
      color: white;
      font-weight: bold;
      text-decoration: none;
      transition: background-color 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="bg-slideshow"></div>

  <header>
    <div class="logo-title">
      <a href="index.html">
        <img src="logo.PNG" alt="Logo" />
        <h1>Brush & Broom LLP</h1>
      </a>
    </div>
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
  </header>

  <div id="menuOverlay" onclick="toggleMenu()"></div>

  <nav id="sideMenu">
    <h2>Brush and Broom</h2>
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="portfolio.html">Portfolio</a>
    <a href="safety.html">Safety</a>
    <a href="contact.html">Contact</a>
  </nav>

  <main>
    <h2>Contact Us</h2>
    <p>Let us know how we can help. Fill out the form or reach out directly.</p>

    <form id="contact-form" action="https://formspree.io/f/mqabwval" method="POST">
      <input type="text" name="name" placeholder="Full Name" required />
      <input type="email" name="email" placeholder="Email Address" required />
      <input type="tel" name="phone" placeholder="Phone Number" />
      <textarea name="message" placeholder="Tell us about your project..." required></textarea>
      <button type="submit">Send Message</button>
      <p id="form-status" style="margin-top: 10px;"></p>
    </form>

    <div class="contact-options">
      <a href="tel:5092004873">📞 (509) 200-4873</a>
      <a href="sms:5092004873">💬 Text Us</a>
      <a href="mailto:bnbllp@brushandbroomllp.com">📧 Email Us</a>
    </div>
  </main>

  <footer>
    <div>
      <a href="tel:5092004873" class="footer-contact">📞 Call Us</a>
      <a href="sms:5092004873" class="footer-contact">💬 Text Us</a>
      <a href="mailto:bnbllp@brushandbroomllp.com" class="footer-contact">📧 Email Us</a>
    </div>
    <p>&copy; 2025 Brush & Broom LLP</p>
  </footer>

  <script>
    function toggleMenu() {
      const menu = document.getElementById("sideMenu");
      const overlay = document.getElementById("menuOverlay");
      menu.classList.toggle("open");
      overlay.style.display = menu.classList.contains("open") ? "block" : "none";
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('#sideMenu a').forEach(link =>
        link.addEventListener('click', toggleMenu)
      );

      const form = document.getElementById("contact-form");
      const status = document.getElementById("form-status");

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        const data = new FormData(form);

        try {
          const response = await fetch(form.action, {
            method: form.method,
            body: data,
            headers: { 'Accept': 'application/json' }
          });

          if (response.ok) {
            status.textContent = "✅ Thank you! Your message has been sent.";
            status.style.color = "lime";
            form.reset();
          } else {
            const err = await response.json();
            status.textContent = "❌ " + (err.message || "Something went wrong.");
            status.style.color = "red";
          }
        } catch (error) {
          status.textContent = "❌ Could not submit form. Please try again later.";
          status.style.color = "red";
        }
      });

      const footerButtons = document.querySelectorAll('.footer-contact');
      const footerColors = ['#ff7a24', '#28c76f', '#2499ff', '#e91e63', '#9c27b0', '#4caf50'];
      function updateFooterColors() {
        footerButtons.forEach(btn => {
          const color = footerColors[Math.floor(Math.random() * footerColors.length)];
          btn.style.backgroundColor = color;
          btn.style.boxShadow = `0 0 10px ${color}88`;
        });
      }
      updateFooterColors();
      setInterval(updateFooterColors, 3000);
    });
  </script>
</body>
</html>
