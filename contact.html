<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<body>
    <header>
        <h1>Contact Us</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="testimonials.html">Testimonials</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h2>Get a Free Quote</h2>
            <form action="mailto:bnbllp@brushandbroomllp.com" method="POST" enctype="text/plain">
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name" required><br><br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required><br><br>

                <label for="phone">Phone:</label><br>
                <input type="tel" id="phone" name="phone"><br><br>

                <label for="services">Services Needed:</label><br>
                <select id="services" name="services">
                    <option value="painting">Painting</option>
                    <option value="cleaning">Cleaning</option>
                    <option value="power-washing">Power Washing</option>
                    <option value="multiple">Multiple Services</option>
                </select><br><br>

                <label for="details">Project Details:</label><br>
                <textarea id="details" name="details" rows="5" required></textarea><br><br>

                <input type="submit" value="Send Request">
            </form>
        </section>
    </main>
    <footer>
        <p>Contact us: bnbllp@brushandbroomllp.com | 509-200-4873</p>
    </footer>
</body>
</html>
