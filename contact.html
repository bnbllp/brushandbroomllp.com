<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Brush & Broom LLP | Get Your Free Quote</title>
  <meta name="description" content="Contact Brush & Broom LLP for painting, cleaning, flooring, and remodeling services in Kirkland and Bellevue, WA. Get a free quote today!" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <meta property="og:title" content="Contact Brush & Broom LLP" />
  <meta property="og:description" content="Serving Kirkland & Bellevue — contact us today for cleaning, painting, or remodeling services." />
  <meta property="og:url" content="https://www.brushandbroomllp.com/contact.html" />

  <style>
    :root {
      --green: #28c76f;
      --navy: #0e1526;
      --grey: #cfd2d6;
      --light: #f8f9fa;
    }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--light); color: #1c1c1c; }
    header { background: var(--navy); color: white; display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; border-bottom: 4px solid var(--green); flex-wrap: wrap; }
    .logo-title { display: flex; align-items: center; gap: 10px; }
    .logo-title img { height: 60px; }
    .logo-title h1 { font-size: 1.8em; color: white; }
    nav a { color: var(--grey); text-decoration: none; margin: 0 1rem; font-weight: 600; transition: color 0.3s; }
    nav a:hover { color: var(--green); }
    main { text-align: center; padding: 3rem 2rem; }
    h2 { color: var(--navy); font-size: 2em; margin-bottom: 1rem; }
    .contact-container { max-width: 700px; background: white; padding: 2rem; border-radius: 10px; margin: 0 auto; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .contact-container p { color: #333; margin-bottom: 1rem; }
    form input, form textarea { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border-radius: 6px; border: 1px solid var(--grey); font-size: 1em; }
    form button { background: var(--green); color: white; border: none; padding: 1rem; font-size: 1.1em; width: 100%; border-radius: 6px; cursor: pointer; transition: background 0.3s ease; }
    form button:hover { background: #22af63; }
    iframe { width: 100%; height: 300px; border: 0; border-radius: 10px; margin-top: 2rem; }
    footer { background: var(--navy); color: var(--grey); text-align: center; padding: 1.5rem; margin-top: 3rem; }
    .footer-contact { display: inline-block; margin: 0.5rem; background: var(--green); color: white; padding: 10px 20px; border-radius: 30px; text-decoration: none; font-weight: bold; transition: transform 0.2s; }
    .footer-contact:hover { transform: scale(1.05); box-shadow: 0 0 10px var(--green); }
  </style>
</head>
<body>
  <header>
    <div class="logo-title">
      <a href="index.html"><img src="logo.PNG" alt="Brush & Broom LLP logo" /></a>
      <h1>Brush & Broom LLP</h1>
    </div>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <h2>Contact Us</h2>
    <div class="contact-container">
      <p>We’d love to hear from you! Fill out the form below or reach us directly by phone or email for a free quote.</p>
      <form action="https://formsubmit.co/seabnbllp@icloud.com" method="POST">
        <input type="hidden" name="_subject" value="New Contact Form - Brush & Broom LLP">
        <input type="hidden" name="_captcha" value="false">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="tel" name="phone" placeholder="Phone Number">
        <textarea name="message" placeholder="How can we help you?" rows="5"></textarea>
        <button type="submit">Send Message</button>
      </form>
      <iframe src="https://www.google.com/maps?q=Kirkland,+WA&output=embed"></iframe>
    </div>
  </main>

  <footer>
    <a href="tel:2065711092" class="footer-contact">Call (206) 571-1092</a>
    <a href="mailto:seabnbllp@icloud.com" class="footer-contact">Email Us</a>
    <p>&copy; 2025 Brush & Broom LLP — Kirkland & Bellevue, WA</p>
  </footer>
</body>
</html>
