
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="description" content="Expert painting, cleaning, siding, and power washing in Walla Walla, WA. Brush & Broom LLP delivers top-notch results with a splash of charm." />
  <meta name="keywords" content="painting Walla Walla, cleaning services, pressure washing, move-out cleaning, siding installation, Brush and Broom LLP" />
  <meta name="author" content="Brush & Broom LLP" />
  <title>Brush & Broom LLP | Painting, Cleaning & More in Walla Walla, WA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange: #ff7a24;
      --blue: #2499ff;
      --green: #2ecc71;
      --pink: #ff6584;
      --skyblue: #6ecbff;
      --bg-dark: #121c2d;
      --light: #ffffff;
      --gray: #f2f2f2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: var(--light);
    }

    header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background-color: #000;
      border-bottom: 3px solid var(--green);
    }

    header img {
      height: 60px;
    }

    .top-left {
      display: flex;
      align-items: center;
    }

    .top-center {
      flex: 1;
      text-align: center;
    }

    .top-center h1 {
      font-size: 1.5em;
      margin: 0;
    }

    .top-right {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .service-top-btn {
      text-decoration: none;
      font-weight: bold;
      padding: 8px 14px;
      border-radius: 20px;
      color: white;
      font-size: 0.9em;
      transition: background-color 0.3s ease;
    }

    .orange-btn { background: var(--orange); }
    .blue-btn { background: var(--blue); }
    .green-btn { background: var(--green); }
    .pink-btn { background: var(--pink); }
    .sky-btn { background: var(--skyblue); }

    .service-top-btn:hover {
      opacity: 0.85;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
    }

    .hero h2 {
      font-size: 2.8em;
      background: linear-gradient(to right, var(--orange), var(--blue), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 900;
      margin-bottom: 20px;
    }

    .cta {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      border-radius: 30px;
      background-color: var(--orange);
      color: white;
      font-weight: bold;
      text-decoration: none;
      border: 2px solid white;
      box-shadow: 0 0 12px rgba(0,0,0,0.3);
      transition: 0.3s ease;
    }

    .cta:hover {
      background: var(--green);
    }

    .section-light {
      background-color: var(--gray);
      color: #111;
      padding: 60px 20px;
      text-align: center;
    }

    .services {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
      max-width: 1200px;
      margin: auto;
    }

    .service-box {
      background: white;
      color: black;
      border-radius: 10px;
      padding: 25px;
      max-width: 280px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .service-box:hover {
      transform: scale(1.03);
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    .service-box img {
      height: 60px;
      margin-bottom: 10px;
    }

    .service-box a {
      display: inline-block;
      margin: 10px 0;
      padding: 10px 20px;
      text-decoration: none;
      color: white;
      border-radius: 25px;
      font-weight: bold;
    }

    .section-dark {
      background: var(--bg-dark);
      color: var(--light);
      padding: 60px 20px;
      text-align: center;
    }

    form {
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }

    form input,
    form textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: none;
      border-radius: 5px;
    }

    .quote-imgs {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 25px;
      flex-wrap: wrap;
    }

    .quote-imgs img {
      width: 180px;
      border-radius: 10px;
    }

    blockquote {
      font-style: italic;
      margin: 20px auto;
      max-width: 600px;
    }

    .footer {
      padding: 40px 20px;
      background: linear-gradient(to right, #000, #1c1c1c);
      text-align: center;
      color: #ccc;
    }

    .footer-icons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px 0;
    }

    .footer-icons img {
      height: 35px;
    }

    @media (max-width: 768px) {
      .services {
        flex-direction: column;
        align-items: center;
      }

      .hero h2 {
        font-size: 2em;
      }

      .top-center h1 {
        font-size: 1.2em;
      }

      form {
        padding: 10px;
      }

      .quote-imgs img {
        width: 100%;
        max-width: 300px;
      }

      .top-right {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <!-- Content remains unchanged -->
</body>
</html>
