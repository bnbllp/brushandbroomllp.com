
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brush & Broom LLP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="logo.jpeg" alt="Brush & Broom LLP Logo" class="logo">
        <h1>Brush & Broom LLP</h1>
        <p>Your local painting & cleaning experts</p>
    </header>
    <section class="services">
        <h2>Our Services</h2>
        <ul>
            <li>Interior & Exterior Painting</li>
            <li>Power Washing</li>
            <li>Residential & Commercial Cleaning</li>
            <li>Organizing & Decluttering</li>
        </ul>
    </section>
    <section class="portfolio">
        <h2>Our Work</h2>
        <p>Gallery coming soon...</p>
    </section>
    <section class="contact">
        <h2>Contact Us</h2>
        <form action="mailto:bnbllp@brushandbroomllp.com" method="post" enctype="text/plain">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" placeholder="Tell us what you need..." required></textarea>
            <button type="submit">Send</button>
        </form>
    </section>
    <footer>
        <p>&copy; 2025 Brush & Broom LLP</p>
    </footer>
</body>
</html>
