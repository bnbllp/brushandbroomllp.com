<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Brush & Broom LLP | Cleaning & Painting in Bellevue & Eastside</title>
  <meta name="description" content="Brush & Broom LLP provides professional cleaning and painting services in Bellevue, Kirkland, and the Eastside. Family-owned, honest work — FREE deep clean with any full repaint.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy:#002244;
      --navy-dark:#001a33;
      --green:#69be28;
      --green-dark:#5aa81f;
      --gray:#6b7280;
      --gray-light:#9ca3af;
      --bg-light:#f8fafc;
      --white:#ffffff;
      --radius-sm:6px;
      --radius-md:14px;
      --radius-lg:20px;
      --shadow-sm:0 6px 15px rgba(0,0,0,.06);
      --shadow-md:0 10px 25px rgba(0,0,0,.10);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Roboto',sans-serif;background:var(--bg-light);color:var(--navy);line-height:1.7}
    img{max-width:100%;display:block}
    a{text-decoration:none;color:inherit}

    h1,h2,h3{font-family:'Playfair Display',serif;font-weight:700}
    h1{font-size:clamp(2.1rem,4vw,2.8rem);margin-bottom:1rem}
    h2{text-align:center;font-size:clamp(1.9rem,3vw,2.3rem);margin-bottom:1.5rem}
    p{color:var(--gray);margin-bottom:1rem}

    .btn{display:inline-block;padding:14px 30px;border-radius:var(--radius-sm);font-weight:700;transition:.2s}
    .btn-primary{background:var(--green);color:var(--white)}
    .btn-primary:hover{background:var(--green-dark);transform:translateY(-2px)}
    .btn-secondary{border:2px solid var(--green);color:var(--green)}
    .btn-secondary:hover{background:var(--green);color:var(--white)}

    /* ===== HEADER ===== */
    #site-header{
      position:fixed;
      top:0;
      width:100%;
      z-index:9999;
      padding:18px 0;
      background:rgba(255,255,255,.96);
      transition:.35s;
      box-shadow:0 4px 15px rgba(0,0,0,.04);
    }

    body.home #site-header{background:transparent;box-shadow:none}
    #site-header.scrolled{padding:10px 0;box-shadow:0 6px 18px rgba(0,0,0,.08)}

    .header-inner{
      max-width:1200px;
      margin:0 auto;
      padding:0 24px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .logo img{height:48px;transition:.35s}
    #site-header.scrolled .logo img{height:40px}

    .desktop-nav{display:flex;gap:22px;font-weight:500}

    .nav-toggle{
      display:none;
      background:none;
      border:none;
      flex-direction:column;
      gap:6px;
      cursor:pointer;
    }

    .nav-toggle span{
      width:26px;height:3px;background:var(--navy);border-radius:3px;
    }

    .mobile-nav{
      display:none;
      flex-direction:column;
      background:var(--white);
      padding:24px;
      border-top:1px solid #e5e7eb;
    }

    #site-header.open .mobile-nav{display:flex}
    body.nav-open{overflow:hidden}

    @media(max-width:900px){
      .desktop-nav{display:none}
      .nav-toggle{display:flex}
    }

    /* ===== HERO ===== */
    .hero{
      margin-top:90px;
      background:linear-gradient(rgba(0,34,68,.9),rgba(0,34,68,.9)),
      url('F2635366-F577-497F-87F2-DAF4138C1243.png') center/cover no-repeat;
      color:var(--white);
      text-align:center;
      padding:110px 20px;
    }

    .hero-logo{
      width:180px;margin:0 auto 24px;
      background:var(--white);
      padding:14px;border-radius:var(--radius-lg);
      box-shadow:var(--shadow-md);
    }

    section{max-width:1200px;margin:0 auto;padding:90px 20px}

    footer{background:var(--navy-dark);color:var(--gray-light);text-align:center;padding:26px;font-size:.85rem}
  </style>
</head>

<body class="home">

<header id="site-header">
  <div class="header-inner">
    <a href="index.html" class="logo">
      <img src="F2635366-F577-497F-87F2-DAF4138C1243.png" alt="Brush & Broom LLP">
    </a>

    <nav class="desktop-nav">
      <a href="index.html">Home</a>
      <a href="house-cleaning-bellevue-seattle.html">Cleaning</a>
      <a href="interior-exterior-house-painting-bellevue-seattle.html">Painting</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>

    <button class="nav-toggle" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>
  </div>

  <nav class="mobile-nav">
    <a href="index.html">Home</a>
    <a href="house-cleaning-bellevue-seattle.html">Cleaning</a>
    <a href="interior-exterior-house-painting-bellevue-seattle.html">Painting</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<section class="hero">
  <img src="F2635366-F577-497F-87F2-DAF4138C1243.png" class="hero-logo" alt="Brush & Broom LLP Logo">
  <h1>We Clean It. We Paint It. You Relax.</h1>
  <p>Husband-and-wife team delivering trusted cleaning & painting services in Bellevue, Kirkland, and the Eastside.</p>
</section>

<footer>
  © 2026 Brush & Broom LLP · Bellevue, Kirkland & Eastside
</footer>

<script src="js/header.js"></script>
</body>
</html>
