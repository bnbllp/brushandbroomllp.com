<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Request an Estimate - Brush and Broom LLP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Request a Free Estimate</h1>
  </header>

  <main>
    <form action="mailto:bnbllp@brushandbroomllp.com" method="POST" enctype="text/plain">
      <label for="name">Your Name:</label>
      <input type="text" id="name" name="Name" required>

      <label for="email">Your Email:</label>
      <input type="email" id="email" name="Email" required>

      <label for="phone">Phone Number:</label>
      <input type="tel" id="phone" name="Phone">

      <label for="services">Services Needed:</label>
      <textarea id="services" name="Services Needed" placeholder="e.g. interior painting, deep cleaning..." required></textarea>

      <label for="date">Preferred Date & Time:</label>
      <input type="text" id="date" name="Preferred Date and Time" placeholder="e.g. June 5th, after 3pm">

      <button type="submit">Send Estimate Request</button>
    </form>

    <p><a href="index.html">← Back to Home</a></p>
  </main>

  <footer>
    <p>We’ll get back to you as soon as possible. Thank you!</p>
  </footer>
</body>
</html>
