<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Our Portfolio - Brush & Broom LLP Projects in Painting, Cleaning, Flooring and More" />
  <title>Our Portfolio | Brush & Broom LLP</title>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #28c76f;
      --text-light: #f9f9f9;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      color: var(--text-light);
      background: #0f172a;
      overflow-x: hidden;
    }
    .bg-slideshow {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
      background-size: cover;
      background-position: center;
      animation: slideBg 24s infinite ease-in-out;
    }
    @keyframes slideBg {
      0%, 100% { background-image: url('bg1.jpg'); }
      25% { background-image: url('bg2.jpg'); }
      50% { background-image: url('bg3.jpg'); }
      75% { background-image: url('bg4.jpg'); }
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 20px;
      background: rgba(15, 23, 42, 0.85);
      border-bottom: 4px solid var(--primary);
    }
    .logo-left {
      display: flex;
      align-items: center;
    }
    .logo-left img {
      height: 60px;
      margin-right: 15px;
    }
    .logo-left h1 {
      font-family: 'Permanent Marker', cursive;
      font-size: 2em;
      margin: 0;
      color: #fff;
      text-shadow: 2px 2px 4px #000;
    }

    nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    nav a {
      padding: 8px 16px;
      border-radius: 20px;
      text-decoration: none;
      font-weight: bold;
      color: #fff;
      background-color: var(--primary);
      box-shadow: 0 3px 10px #28c76f80;
    }

    .menu-toggle {
      font-size: 1.5em;
      cursor: pointer;
      background: none;
      border: none;
      color: #fff;
      display: none;
    }

    .side-menu {
      position: fixed;
      top: 0;
      right: -300px;
      width: 250px;
      height: 100%;
      background: #1e293b;
      padding: 30px 20px;
      box-shadow: -2px 0 10px #000;
      transition: right 0.3s ease;
      z-index: 999;
    }
    .side-menu.open {
      right: 0;
    }
    .side-menu a {
      display: block;
      color: white;
      text-decoration: none;
      padding: 12px 0;
      border-bottom: 1px solid #444;
    }

    main {
      max-width: 1000px;
      margin: 40px auto 100px;
      padding: 30px;
      background: rgba(15, 23, 42, 0.9);
      border-radius: 15px;
    }
    main h2 {
      font-size: 2.5em;
      margin-bottom: 20px;
      text-align: center;
      background: linear-gradient(to right, #ff7a24, #2499ff, #28c76f);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .portfolio-gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }
    .portfolio-gallery img {
      width: 300px;
      border-radius: 12px;
      border: 3px solid var(--primary);
      box-shadow: 0 0 15px #00000055;
      transition: transform 0.3s ease;
    }
    .portfolio-gallery img:hover {
      transform: scale(1.03);
    }

    footer {
      text-align: center;
      background: rgba(15, 23, 42, 0.85);
      padding: 25px 10px;
      font-size: 0.9em;
      color: #ccc;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
    .footer-contact {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 30px;
      font-weight: bold;
      text-decoration: none;
      color: white;
      margin: 5px;
      background-color: #28c76f;
      box-shadow: 0 3px 10px #28c76f80;
    }
    .footer-contact:hover {
      background-color: #1e7a4d;
    }
    .social-icons img {
      height: 30px;
      margin: 0 10px;
      vertical-align: middle;
    }

    @media (max-width: 768px) {
      nav {
        display: none;
      }
      .menu-toggle {
        display: block;
      }
    }

    @media (min-width: 769px) {
      .menu-toggle {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="bg-slideshow"></div>

  <header>
    <div class="logo-title">
      <a href="index.html"><img src="logo.PNG" alt="Logo" style="height: 75px;" /></a>
      <h1>Brush & Broom LLP</h1>
    </div>
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
  </header>

  <div id="menuOverlay" onclick="toggleMenu()"></div>

  <div id="sideMenu" class="side-menu">
    <h2>Menu</h2>
    <a href="services.html">Services</a>
    <a href="about.html">About Us</a>
    <a href="portfolio.html">Our Portfolio</a>
    <a href="safety.html">Safety & Preparation</a>
    <a href="contact.html">Contact Us</a>
  </div>

  <main>
    <h2>Our Portfolio</h2>
    <p style="text-align:center;">A collection of our favorite transformations, from full home repaints to deep cleaning miracles and everything in between.</p>

    <div class="portfolio-gallery">
      <img src="Side by side before and after.png" alt="Before and after paint project" loading="lazy" />
      <img src="cleaning side by side.png" alt="Before and after deep clean" loading="lazy" />
      <img src="exterior-paint-icon.png" alt="Exterior painting icon" loading="lazy" />
      <img src="interior-paint-icon.PNG" alt="Interior painting icon" loading="lazy" />
    </div>
  </main>

<footer>
  <div style="margin-bottom: 15px;">
    <a href="tel:5092004873" class="footer-contact small-btn">📞 Call Us</a>
    <a href="sms:5092004873" class="footer-contact small-btn">💬 Text Us</a>
    <a href="mailto:bnbllp@brushandbroomllp.com" class="footer-contact small-btn">📧 Email Us</a>
  </div>
  <div class="social-icons">
    <a href="https://facebook.com"><img src="facebook_icon.PNG" alt="Facebook" /></a>
    <a href="https://yelp.com"><img src="yelp_icon.PNG" alt="Yelp" /></a>
    <a href="https://nextdoor.com"><img src="nextdoor_icon.PNG" alt="Nextdoor" /></a>
    <a href="https://google.com"><img src="google_icon.PNG" alt="Google" /></a>
  </div>
  <p>&copy; 2025 Brush & Broom LLP</p>
</footer>
  
  <script>
    const colors = ['#ff7a24', '#28c76f', '#2499ff', '#e91e63', '#9c27b0', '#3f51b5', '#ff5722', '#ffc107', '#00bcd4', '#4caf50', '#607d8b', '#f44336'];
    const buttons = document.querySelectorAll('.service-grid a');

    function randomizeColors() {
      buttons.forEach(btn => {
        const rand = colors[Math.floor(Math.random() * colors.length)];
        btn.style.backgroundColor = rand;
        btn.style.boxShadow = `0 3px 10px ${rand}80`;
      });
    }
    randomizeColors();
    setInterval(randomizeColors, 3000);

    function toggleMenu() {
      const menu = document.getElementById("sideMenu");
      const overlay = document.getElementById("menuOverlay");
      menu.classList.toggle("open");
      overlay.style.display = menu.classList.contains("open") ? "block" : "none";
    }

    // Close menu when a link is clicked
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('#sideMenu a').forEach(link => {
        link.addEventListener('click', toggleMenu);
      });
    });
  </script>
</body>
</html>
